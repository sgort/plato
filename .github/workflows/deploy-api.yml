name: Build and Deploy API

on:
  push:
    branches: [main]
    paths: [api/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 1. Install dependencies into a folder
      - name: Install dependencies
        run: |
          cd api
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target ./package

      # 2. Copy app into same folder
      - name: Create deployment package
        run: |
          cd api
          zip -r ../app.zip . -x "package/*"

      # 3. Create ZIP artifact
      - name: Create ZIP
        run: |
          cd api/package
          zip -r ../../app.zip .

      # 4. Upload artifact (optional but useful)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: app.zip

      # 5. Deploy to Azure (no build on Azure)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: plato-api
          package: app.zip
