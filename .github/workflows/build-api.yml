name: Build API Artifact

on:
  push:
    branches: [main]
    paths: [api/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies into package folder
      - name: Install dependencies
        run: |
          cd api
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target ./package

      # 4. Copy ONLY app files safely (no recursion issues)
      - name: Copy application code
        run: |
          cd api
          rsync -av \
            --exclude 'package' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            ./ package/

      # 5. Create ZIP artifact (clean deployment package)
      - name: Create deployment ZIP
        run: |
          cd api/package
          zip -r ../../app.zip .

      # 6. Upload artifact for download
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plato-api-build
          path: app.zip
